<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>News - N1709 Update</title>
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --subtext: #9a9a9a;
            --border: rgba(255, 255, 255, 0.12);
            --card-bg: #080808;
            --nav-bg: rgba(10, 10, 10, 0.7);
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Product Sans', sans-serif !important;
            -webkit-tap-highlight-color: transparent;
        }
 
        html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; }
 
        body {
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        .top-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            z-index: 10;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.9) 50%, transparent 100%);
            pointer-events: none;
        }
 
        .glare-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        .glare-bg::before, .glare-bg::after {
            content: '';
            position: absolute;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            filter: blur(90px);
            mix-blend-mode: screen;
            opacity: 0.12;
        }
        .glare-bg::before {
            top: -20%;
            left: -10%;
            background: radial-gradient(circle, #ffffff 0%, transparent 70%);
            animation: glare-drift-1 18s ease-in-out infinite;
        }
        .glare-bg::after {
            bottom: -25%;
            right: -15%;
            background: radial-gradient(circle, #ffffff 0%, transparent 70%);
            animation: glare-drift-2 22s ease-in-out infinite;
        }
        @keyframes glare-drift-1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(35vw, 25vh); }
        }
        @keyframes glare-drift-2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30vw, -20vh); }
        }
 
        nav, .hero, .container { position: relative; z-index: 2; }
 
        .blackhole-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-in-out;
        }
 
        .blackhole {
            width: 60px;
            height: 60px;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 30px 5px #fff, 0 0 60px 10px #333;
            animation: absorb 1.2s ease-in-out forwards;
        }
 
        @keyframes absorb {
            0% { transform: scale(0.1); opacity: 0; }
            50% { transform: scale(1.8); opacity: 1; box-shadow: 0 0 50px 15px #fff; }
            100% { transform: scale(0); opacity: 0; }
        }
 
        .loader-hidden { opacity: 0; pointer-events: none; }
 
        @keyframes navReveal {
            0% { transform: translateY(-150%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
 
        nav {
            position: fixed;
            top: 25px;
            left: 25px;
            width: fit-content;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 10px 8px 28px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            animation: navReveal 0.7s cubic-bezier(0.23, 1, 0.32, 1) 1.2s both;
            transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            touch-action: pan-x;
            cursor: grab;
        }
        nav:active { cursor: grabbing; }
        nav.nav-hidden { transform: translateY(-150%); }
 
        .nav-handle {
            position: fixed;
            top: 10px;
            left: 55px;
            width: 60px;
            height: 5px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.35);
            z-index: 1001;
            cursor: pointer;
            touch-action: none;
            transform: scaleX(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s;
        }
        .nav-handle.visible {
            transform: scaleX(1);
            opacity: 1;
            pointer-events: auto;
        }
        .nav-handle:hover { background: rgba(255, 255, 255, 0.6); }
 
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .nav-left { display: flex; align-items: center; gap: 12px; }

        .music-player {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px;
        }
        .music-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease, color 0.25s ease;
            flex-shrink: 0;
        }
        .music-btn:hover { background: rgba(255, 255, 255, 0.12); }
        .music-btn:active { transform: scale(0.88); }
        .music-btn svg { width: 16px; height: 16px; }
        .music-btn.play-btn {
            width: 32px; height: 32px;
            background: #fff;
            color: #000;
        }
        .music-btn.play-btn:hover { background: #eaeaea; }
        .music-btn.lock-btn.active {
            background: #fff;
            color: #000;
        }
        .music-btn.lock-btn.active:hover { background: #eaeaea; }
        .music-title {
            font-size: 0.7rem;
            color: var(--subtext);
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 6px 0 4px;
            display: none;
        }
        @media (min-width: 480px) {
            .music-title { display: block; }
        }

        .btn-download {
            background: white; color: black;
            padding: 10px 22px; border-radius: 50px;
            font-size: 0.85rem; text-decoration: none;
            font-weight: 500; transition: 0.3s ease;
            white-space: nowrap;
        }
        .btn-download:hover { transform: scale(1.05); }
        .btn-download:active { transform: scale(0.95); }
 
        .avatar-menu { position: relative; }
        .avatar-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            padding: 0;
            cursor: pointer;
            overflow: hidden;
            background: #111;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.3s;
        }
        .avatar-btn:hover { border-color: rgba(255,255,255,0.4); transform: scale(1.05); }
        .avatar-btn:active { transform: scale(0.88); }
        .avatar-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
 
        .avatar-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 8px;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transform-origin: top left;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-16px) scale(0.75);
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.4s;
        }
        .avatar-dropdown.open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .avatar-dropdown a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: black;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 10px 22px;
            border-radius: 50px;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), background 0.2s, opacity 0.25s ease;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(-6px);
        }
        .avatar-dropdown.open a {
            opacity: 1;
            transform: translateY(0);
        }
        .avatar-dropdown.open a:nth-child(1) { transition-delay: 0.05s; }
        .avatar-dropdown.open a:nth-child(2) { transition-delay: 0.1s; }
        .avatar-dropdown a:hover { transform: scale(1.05); background: #f0f0f0; }
        .avatar-dropdown a:active { transform: scale(0.95); }
 
        .hero {
            padding: 190px 10% 60px;
            text-align: center;
            background: radial-gradient(circle at top, #111 0%, #000 70%);
        }
 
        .gradient-text {
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; display: inline-block;
        }
 
        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            line-height: 1.1;
            margin-bottom: 18px;
            font-weight: 400;
            letter-spacing: -1px;
        }
 
        .hero p {
            color: var(--subtext);
            max-width: 560px;
            margin: 0 auto;
            font-size: 1.05rem;
            line-height: 1.5;
        }
 
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 5% 0;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
 
        .container.show { opacity: 1; transform: translateY(0); }
 
        .content-area {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 1.5rem;
            min-height: 40vh;
            max-height: 60vh;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .content-area::-webkit-scrollbar { display: none; width: 0; height: 0; }
 
        .news-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            word-wrap: break-word;
        }
        .news-item:hover { border-color: #fff; background: rgba(255, 255, 255, 0.05); transform: translateY(-2px); }
        .news-item:active { transform: scale(0.98); }
 
        .news-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .news-description { font-size: 0.9rem; color: #ccc; margin-bottom: 0.5rem; }
        .news-time { font-size: 0.85rem; color: #888; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
 
        .state-msg { text-align: center; padding: 3rem 1rem; font-weight: 500; }
        .state-msg.loading { color: #888; }
        .state-msg.empty { color: #555; }
        .state-msg.error { color: #ff6b6b; }
        .state-msg small { display: block; margin-top: 8px; font-weight: 400; color: #666; font-size: 0.8rem; }
 
        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-top: 2.5rem;
            padding-bottom: 40px;
            letter-spacing: 1px;
        }
        .footer p { color: #555; }
 
        @media (min-width: 768px) {
            .content-area { padding: 2.5rem; border-radius: 35px; }
            .news-title { font-size: 1.3rem; }
        }
 
        @media (max-width: 480px) {
            .hero { padding: 150px 6% 40px; }
            .btn-download { padding: 9px 16px; font-size: 0.8rem; }
            nav { padding: 8px 8px 8px 20px; }
        }
 
        @media (orientation: landscape) and (max-height: 500px) {
            .hero { padding: 110px 8% 30px; }
            .content-area { min-height: 30vh; max-height: 50vh; }
        }
 
        @media (min-resolution: 2dppx), (-webkit-min-device-pixel-ratio: 2) {
            nav, .content-area, .news-item, .avatar-dropdown, .btn-download, .avatar-btn {
                border-width: 0.5px;
            }
        }
    </style>
</head>
<body>
 
    <div class="glare-bg"></div>
    <div class="top-line"></div>
 
    <div class="blackhole-overlay" id="loader">
        <div class="blackhole"></div>
    </div>
 
    <nav>
        <div class="nav-left">
            <div class="avatar-menu">
                <button class="avatar-btn" id="avatarBtn" aria-label="More links">
                    <img src="profile/avatar.png" alt="Foto Profil" width="200" height="200">
 
                </button>
                <div class="avatar-dropdown avatar-dropdown-left" id="avatarDropdown">
                    <a href="https://github.com/N1709" target="_blank">GitHub</a>
                    <a href="https://t.me/NKB0B" target="_blank">Telegram</a>
                </div>
            </div>
            <a href="./devices.html" class="btn-download">Devices</a>

            <div class="music-player" id="musicPlayer">
                <button class="music-btn" id="prevBtn" aria-label="Previous track" title="Previous">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="music-btn play-btn" id="playBtn" aria-label="Play/Pause" title="Play/Pause">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
                </button>
                <button class="music-btn" id="nextBtn" aria-label="Next track" title="Next">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
                </button>
                <button class="music-btn lock-btn" id="lockBtn" aria-label="Repeat this song / lock" title="Keep repeating this song">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a4 4 0 0 0-4 4v3H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1V7a4 4 0 0 0-4-4zm-2 4a2 2 0 1 1 4 0v3h-4z"/></svg>
                </button>
                <span class="music-title" id="musicTitle">—</span>
            </div>
        </div>
    </nav>

    <audio id="bgAudio" preload="auto"></audio>
 
    <div class="nav-handle" id="navHandle" title="Pull down to show the menu"></div>
 
    <section class="hero">
        <h1 class="gradient-text">News</h1>
        <p>Central hub for N1709 ROM builds, port, official announcements, and device documentation — updated automatically.</p>
    </section>
 
    <div class="container" id="main-content">
        <div class="content-area">
            <div id="news-container"></div>
        </div>
 
        <div class="footer">
            <p>© 2026 N1709. All rights reserved.</p>
        </div>
    </div>
 
    <script>
        const CONFIG = {
            owner: 'N1709',
            repo: 'N1709.github.io',
            branch: 'main',
            newsPath: 'news'
        };
 
        function setState(container, type, message, hint) {
            container.innerHTML = `<div class="state-msg ${type}">${message}${hint ? `<small>${hint}</small>` : ''}</div>`;
        }
 
        async function listFolder(path) {
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`;
            const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
 
            if (res.status === 404) return [];
            if (!res.ok) {
                const remaining = res.headers.get('x-ratelimit-remaining');
                if (res.status === 403 && remaining === '0') throw new Error('RATE_LIMIT');
                throw new Error(`HTTP_${res.status}`);
            }
            const items = await res.json();
            if (!Array.isArray(items)) return [];
            return items.filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.html'));
        }
 
        async function readNewsMeta(fileItem) {
            const res = await fetch(fileItem.download_url);
            const text = await res.text();
            const doc = new DOMParser().parseFromString(text, 'text/html');
            const get = (name) => doc.querySelector(`meta[name="${name}"]`)?.content || '';
 
            const title = get('news-title');
            if (!title) return null;
            return { title, desc: get('news-description'), date: get('date'), file: fileItem.path };
        }
 
        function renderNewsItems(items) {
            return items.map(item => `
                <div class="news-item" onclick="window.location.href='${item.file}'">
                    <div class="news-title">${item.title}</div>
                    <div class="news-description">${item.desc || ''}</div>
                    <div class="news-time">${item.date || ''}</div>
                </div>
            `).join('');
        }
 
        async function loadNews() {
            const container = document.getElementById('news-container');
            setState(container, 'loading', 'Loading news…');
            try {
                const files = await listFolder(CONFIG.newsPath);
                if (files.length === 0) {
                    setState(container, 'empty', 'No news available yet.');
                    return;
                }
                const results = await Promise.all(files.map(f => readNewsMeta(f).catch(() => null)));
                const valid = results.filter(Boolean);
                valid.sort((a, b) => new Date(b.date) - new Date(a.date) || 0);
 
                if (valid.length === 0) {
                    setState(container, 'empty', 'No valid news pages found.', 'Files exist but are missing the required <meta> tags.');
                    return;
                }
                container.innerHTML = renderNewsItems(valid);
            } catch (err) {
                if (err.message === 'RATE_LIMIT') {
                    setState(container, 'error', 'GitHub API rate limit reached.', 'Try again in a few minutes.');
                } else {
                    setState(container, 'error', 'Could not load news.', err.message);
                }
            }
        }
 
        const navEl = document.querySelector('nav');
        const navHandle = document.getElementById('navHandle');
 
        navEl.addEventListener('animationend', () => {
            navEl.style.animation = 'none';
        }, { once: true });
 
        function hideNav() {
            navEl.classList.add('nav-hidden');
            navHandle.classList.add('visible');
        }
        function showNav() {
            navEl.classList.remove('nav-hidden');
            navHandle.classList.remove('visible');
        }
 
        function makeDraggable(el, { onHide, onShow, direction }) {
            let dragging = false;
            let startY = 0;
 
            function onMove(e) {
                if (!dragging) return;
                const deltaY = e.clientY - startY;
                if (direction === 'hide' && deltaY < 0) {
                    navEl.style.transform = `translateY(${deltaY}px)`;
                } else if (direction === 'show' && deltaY > 0) {
                    navEl.style.transform = `translateY(${-150 + Math.min(deltaY, 150) / 150 * 150}%)`;
                }
            }
 
            function onUp(e) {
                if (!dragging) return;
                dragging = false;
                navEl.style.transition = '';
                navEl.style.transform = '';
                const deltaY = e.clientY - startY;
                if (direction === 'hide' && deltaY < -25) onHide();
                if (direction === 'show' && deltaY > 25) onShow();
                window.removeEventListener('pointermove', onMove);
                window.removeEventListener('pointerup', onUp);
            }
 
            el.addEventListener('pointerdown', (e) => {
                dragging = true;
                startY = e.clientY;
                navEl.style.transition = 'none';
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            });
        }
 
        makeDraggable(navEl, { onHide: hideNav, direction: 'hide' });
        makeDraggable(navHandle, { onShow: showNav, direction: 'show' });
        navHandle.addEventListener('click', showNav);
 
        const avatarBtn = document.getElementById('avatarBtn');
        const avatarDropdown = document.getElementById('avatarDropdown');
        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            avatarDropdown.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!avatarDropdown.contains(e.target) && e.target !== avatarBtn) {
                avatarDropdown.classList.remove('open');
            }
        });
 
        window.addEventListener('DOMContentLoaded', () => {
            loadNews();
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');
            setTimeout(() => {
                loader.classList.add('loader-hidden');
                mainContent.classList.add('show');
            }, 1200);
        });

        const PLAYLIST = [
            { title: 'Track 1', src: 'music/La Cheyenne   El De Las R s.mp3' },
            { title: 'Track 2', src: 'music/2.mp3' },
            { title: 'Track 3', src: 'music/3.mp3' }
        ];

        const audio = document.getElementById('bgAudio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const lockBtn = document.getElementById('lockBtn');
        const musicTitle = document.getElementById('musicTitle');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        let trackIndex = 0;
        let isLocked = false; // true = lagu tidak berganti, diulang terus

        function loadTrack(index, autoplay) {
            trackIndex = (index + PLAYLIST.length) % PLAYLIST.length;
            const track = PLAYLIST[trackIndex];
            audio.src = track.src;
            musicTitle.textContent = track.title;
            if (autoplay) attemptPlay();
        }

        function attemptPlay() {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    setPlayingUI(true);
                }).catch(() => {

                    setPlayingUI(false);
                    const resume = () => {
                        audio.play().then(() => setPlayingUI(true)).catch(() => {});
                        document.removeEventListener('click', resume);
                        document.removeEventListener('touchstart', resume);
                        document.removeEventListener('keydown', resume);
                    };
                    document.addEventListener('click', resume, { once: true });
                    document.addEventListener('touchstart', resume, { once: true });
                    document.addEventListener('keydown', resume, { once: true });
                });
            }
        }

        function setPlayingUI(playing) {
            playIcon.style.display = playing ? 'none' : 'block';
            pauseIcon.style.display = playing ? 'block' : 'none';
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                attemptPlay();
            } else {
                audio.pause();
                setPlayingUI(false);
            }
        });

        prevBtn.addEventListener('click', () => loadTrack(trackIndex - 1, true));
        nextBtn.addEventListener('click', () => loadTrack(trackIndex + 1, true));

        lockBtn.addEventListener('click', () => {
            isLocked = !isLocked;
            lockBtn.classList.toggle('active', isLocked);
            lockBtn.title = isLocked ? 'Locked: song will repeat' : 'Keep repeating this song';
        });

        audio.addEventListener('ended', () => {
            if (isLocked) {

                audio.currentTime = 0;
                audio.play().catch(() => {});
            } else {
                loadTrack(trackIndex + 1, true);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadTrack(0, true);
        });
    </script>
